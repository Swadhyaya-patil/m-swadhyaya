{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white shadow rounded-xl p-8">
    <h2 class="text-2xl font-bold text-center mb-6 text-[#121810]">Admin Login</h2>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div class="mb-4 px-4 py-3 rounded text-sm bg-red-100 text-red-800">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
        <input type="text" name="username" placeholder="Username" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#8cd279]">
        <input type="password" name="password" placeholder="Password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#8cd279]">
        <button type="submit"
            class="w-full h-10 bg-[#8cd279] text-[#121810] font-bold rounded-full hover:bg-[#7ac66a] transition">
            Login
        </button>
    </form>
</div>
{% endblock %}
