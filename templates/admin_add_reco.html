<!-- templates/admin_add_reco.html -->
{% extends 'base.html' %}
{% block title %}Add Recommendation{% endblock %}
{% block content %}
<h2>Add Trade Recommendation</h2>
<form method="post" class="mt-3">
        <div class="mb-3"><input class="form-control" name="script_name" placeholder="Script Name" required></div>
        <div class="mb-3"><input class="form-control" type="date" name="reco_dt" required></div>
        <div class="mb-3"><input class="form-control" type="number" step="0.01" name="purchase_price"
                        placeholder="Purchase Price" required></div>
        <div class="mb-3"><input class="form-control" name="reasoning" placeholder="Reasoning" required></div>
        <div class="mb-3"><input class="form-control" type="number" step="0.01" name="tls"
                        placeholder="Trailing Stop Loss" required></div>
        <div class="mb-3"><input class="form-control" type="number" name="qty" placeholder="Quantity" required></div>
        <button class="btn btn-success">Add</button>
</form>
{% endblock %}
