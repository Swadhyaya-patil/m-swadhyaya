{% extends 'base.html' %}
{% block title %}Add Trade Recommendation{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 px-4">
    <h2 class="text-2xl font-bold mb-6 text-[#121810]">Add Trade Recommendation</h2>

    {% for message in get_flashed_messages() %}
    <div class="mb-4 rounded-md bg-green-100 px-4 py-2 text-green-800 text-sm">
        {{ message }}
    </div>
    {% endfor %}

    <form method="POST" class="flex flex-col gap-4">
        <div>
            <label class="block mb-1 text-sm font-medium text-[#121810]">Script Name:</label>
            <input type="text" name="script_name" placeholder="Script Name" required
                class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8cd279]">
        </div>

        <div>
            <label class="block mb-1 text-sm font-medium text-[#121810]">Recommendation Date:</label>
            <input type="date" name="reco_dt" value="{{ current_date }}" readonly
                class="w-full bg-gray-100 border border-gray-300 rounded-md px-4 py-2 text-sm">
        </div>

        <div>
            <label class="block mb-1 text-sm font-medium text-[#121810]">Purchase Price:</label>
            <input type="number" step="0.01" name="purchase_price" placeholder="e.g., 2500.50" required
                class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8cd279]">
        </div>

        <div>
            <label class="block mb-1 text-sm font-medium text-[#121810]">Reasoning:</label>
            <textarea name="reasoning" placeholder="Why recommend this trade?" rows="4" required
                class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8cd279]"></textarea>
        </div>

        <div>
            <label class="block mb-1 text-sm font-medium text-[#121810]">Trailing Stop Loss (TLS):</label>
            <input type="number" step="0.01" name="tls" placeholder="e.g., 100.00" required
                class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8cd279]">
        </div>

        <button type="submit"
            class="mt-2 inline-flex items-center justify-center rounded-full h-10 px-4 bg-[#8cd279] text-sm font-bold text-[#121810] hover:bg-[#7ac66a] transition">
            Add Recommendation
        </button>
    </form>
</div>
{% endblock %}
