version: "3.9"

services:
  web:
    build: .
    container_name: swadhyaya_app
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      DB_USER: swadhyaya
      DB_PASSWORD: admin
      DB_HOST: db
      DB_NAME: swadhyaya_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: swadhyaya_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: swadhyaya_db
      MYSQL_USER: swadhyaya
      MYSQL_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: